<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iris Vanilla Demo</title>
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/legacy.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <h1 class="hero-title">Iris Vanilla Demo</h1>
        <p class="hero-subtitle">
          No framework here: plain HTML, JS and CSS — three stylesheets with
          one deliberate token conflict, plus a JS-injected card.
        </p>
        <button class="button button--primary" type="button">Get started</button>
      </header>

      <section class="section">
        <h2 class="section-title">Features</h2>
        <div class="section-body" id="cards">
          <article class="card">
            <header class="card-header">
              <h3 class="card-title">Click to source</h3>
              <span class="badge legacy-accent">new</span>
            </header>
            <p class="card-text">Static elements carry their file and line.</p>
            <button class="button" type="button">Learn more</button>
          </article>

          <article class="card">
            <header class="card-header">
              <h3 class="card-title">Token aware</h3>
              <span class="badge legacy-accent">soon</span>
            </header>
            <p class="card-text">Linked stylesheets are indexed and explained.</p>
            <button class="button button--ghost" type="button">Preview</button>
          </article>
        </div>
      </section>
    </main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
